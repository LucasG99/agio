<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ágio — Acesso do escritório</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <div class="login-card">
        <div class="login-logo">
          <h1>Ágio</h1>
          <p>Acesso do escritório de contabilidade</p>
        </div>

        <div id="erro-login" class="erro-msg hidden"></div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input class="input" type="email" id="email" placeholder="contador@escritorio.com.br" autocomplete="email">
        </div>

        <div class="form-group" style="margin-bottom:24px;">
          <label for="senha">Senha</label>
          <input class="input" type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button class="btn btn-primary btn-full" id="btn-login">Entrar</button>
      </div>

      <p class="login-footer">Primeiro acesso? Fale com o consultor Ágio.</p>
    </div>
  </div>

  <script>
    const btnLogin = document.getElementById('btn-login');
    const erroEl  = document.getElementById('erro-login');

    function mostrarErro(msg) {
      erroEl.textContent = msg;
      erroEl.classList.remove('hidden');
    }

    btnLogin.addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;

      if (!email || !senha) { mostrarErro('Preencha e-mail e senha.'); return; }

      btnLogin.disabled = true;
      btnLogin.textContent = 'Entrando...';
      erroEl.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });
        const data = await res.json();
        if (!res.ok) { mostrarErro(data.erro || 'Erro ao fazer login.'); return; }
        localStorage.setItem('escritorio_id', data.id);
        localStorage.setItem('escritorio_nome', data.nome);
        localStorage.setItem('escritorio_email', data.email);
        window.location.href = '/painel.html';
      } catch {
        mostrarErro('Não foi possível conectar ao servidor.');
      } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Entrar';
      }
    });

    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') btnLogin.click();
    });
  </script>
</body>
</html>
